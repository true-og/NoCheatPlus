# Custom NCP Config 3.3-OG created by CaptainObvious0, forked by Xinepeng, then forked by NotAlexNoyle.
# Rebased on Updated-NCP 3.17.1-SNAPSHOT-Updated for Minecraft 1.19.4
# Dependencies:
# ProtocolLib https://github.com/true-og/ProtocolLib
# false so NCP never rewrites/reorders/strips comments from this file; the tracked config.yml resource stays canonical.
savebackconfig: false
logging:
  active: true
  maxqueuesize: 5000
  extended:
    status: false
    commands:
      actions: false
    allviolations:
      debug: false
      debugonly: false
      backend:
        trace: false
        notify: true
  backend:
    console:
      active: true
      asynchronous: true
    file:
      active: true
      prefix: ''
      filename: nocheatplus.log
    ingamechat:
      active: true
      prefix: '&7&l[&cNC+&7&l]&7 '
data:
  expiration:
    active: false
    duration: 60
    history: false
  consistencychecks:
    active: true
    interval: 10
    maxtime: 2
    suppresswarnings: false
permissions:
  policy:
    default: ALWAYS
    rules:
    - 'nocheatplus.notify :: INTERVAL:60, -world, -offline'
    - 'nocheatplus.admin.debug :: INTERVAL:10'
    - 'nocheatplus.admin* :: ALWAYS'
    - 'nocheatplus.command* :: ALWAYS'
    - 'nocheatplus.bypass* :: ALWAYS'
    - 'regex:^nocheatplus\.checks\..*\.silent$ :: FALSE'
    - 'nocheatplus.checks* :: INTERVAL:6'
protection:
  plugins:
    hide:
      active: true
      nopermission:
        message: '&cI''m sorry, but you do not have permission to perform this command.
          Please contact the server administrators if you believe that this is in
          error.'
        commands:
        - plugins
        - version
        - icanhasbukkit
      unknowncommand:
        message: Unknown command. Type "/help" for help.
        commands: []
  commands:
    consoleonly:
      active: false
      message: '&cI''m sorry, but this command can''t be executed in chat. Use the
        console instead!'
      commands:
      - op
      - deop
checks:
  active: true
  lag: true
  debug: false
  blockbreak:
    active: true
    direction:
      active: true
      actions: vl>100 log:bdirection:10:8:i cancel
    fastbreak:
      active: default
      strict: false
      delay: 20
      intervalsurvival: 100
      grace: 1000
      actions: cancel vl>5 cancel log:fastbreak:4:2:i vl>50 cmdc:kickfastbreak:2:5
    frequency:
      active: false
      intervalcreative: 95
      intervalsurvival: 45
      shortterm:
        ticks: 5
        limit: 7
      actions: cancel vl>5 log:bbfrequency:3:5:i cancel vl>40 log:bbfrequency:0:5:if
        cancel cmdc:kickfrequency:0:5
    noswing:
      active: true
      actions: cancel vl>10 log:noswing:0:10:i cancel
    reach:
      active: true
      actions: cancel vl>5 log:breach:0:10:i cancel
    wrongblock:
      active: default
      level: 10
      improbable:
        feedonly: false
        weight: 0.7
      actions: cancel vl>15 log:bwrong:2:5:i cancel vl>30 cancel log:bwrong:0:5:if
        cmdc:kickwb:0:5
  blockinteract:
    active: true
    direction:
      active: false
      actions: cancel vl>200 cancel log:bdirection:1:10:if cmdc:kickillegalblockinteract:1:5
    reach:
      active: true
      actions: cancel log:breach:5:6:i
    speed:
      active: true
      interval: 2000
      limit: 45
      actions: cancel vl>3000 cancel vl>4250 cancel vl>5000 cancel
    visible:
      active: false
      actions: cancel vl>150 cancel
  blockplace:
    active: true
    against:
      active: false
      actions: cancel log:against:1:5:i vl>10 cancel log:against:0:2:if cmdc:kickagainst:0:10
    autosign:
      active: default
      skipempty: false
      actions: cancel vl>10 log:bautosign:0:3:if cancel
    direction:
      active: default
      actions: cancel vl>50 log:bdirection:0:8:i cancel
    fastplace:
      active: true
      limit: 25
      shortterm:
        ticks: 10
        limit: 12
      improbable:
        feedonly: false
        weight: 0.3
      actions: cancel vl>10 cancel log:fastplace:8:3:i vl>20 cancel log:fastplace:2:4:i
        vl>80 cancel log:fastplace:0:10:if cmdc:kickfastplace:1:10
    reach:
      active: true
      actions: cancel vl>5 log:breach:0:8:i cancel
    noswing:
      active: false
      exceptions:
      - LILY_PAD
      - FLINT_AND_STEEL
      actions: vl>20 log:noswing:0:12:i
    scaffold:
      active: false
      angle: true
      sprint: true
      time:
        active: true
        average: 2
      rotate:
        active: true
        difference: 90
      toolswitch: true
      improbable:
        feedonly: false
        weight: 0.4
      actions: cancel vl>10 cancel log:scaffold:3:7:if vl>70 cancel log:scaffold:0:5:if
        cmd:clearscaffold:0:1 cmdc:kickscaffold:0:1
    speed:
      active: true
      interval: 40
      improbable:
        feedonly: true
        weight: 0.3
      actions: cancel vl>100 log:bpspeed:6:7:i cancel vl>1000 log:bpspeed:3:5:if cancel
    preventmisc:
      boatsanywhere: true
  chat:
    active: default
    captcha:
      active: 'false'
      skip:
        commands: false
      characters: abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!?><
      length: 6
      question: '&c&l(!)&7 Please type ''&6[captcha]&7'' to continue using chat.'
      success: '&c&l(!)&7 Antispam check passed.'
      tries: 3
      actions: cancel cmdc:kickcaptcha vl>4 log:captcha:2:5:cf cancel cmdc:kickcaptcha
    commands:
      active: default
      exclusions:
      - undo
      - redo
      handleaschat:
      - me
      - msg
      - emsg
      - essentials:msg
      - tell
      - etell
      - essentials:tell
      - say
      - esay
      - essentials:say
      - whisper
      - ewhisper
      - essentials:whisper
      - w
      - essentials:w
      - ew
      - r
      - er
      - essentials:r
      - reply
      - essentials:reply
      - ereply
      level: 10
      shortterm:
        ticks: 18
        level: 3
      actions: log:commands:0:5:cf cancel cmdc:kickcommands vl>20 log:commands:0:5:cf
        cancel cmdc:tempkick1
    text:
      active: default
      allowvlreset: true
      frequency:
        normal:
          minimum: 0.0
          factor: 0.9
          weight: 6
          level: 160
          actions: cancel cmdc:tellchatnormal vl>7 log:chatnormal:0:5:cif cancel cmdc:tellchatnormal
            vl>20 log:chatnormal:0:5:cif cancel cmdc:kickchatnormal vl>40 log:chatnormal:0:5:cif
            cancel cmdc:kickchat5
        shortterm:
          minimum: 2.0
          factor: 0.7
          weight: 3.0
          level: 20.0
          actions: log:chatfast:2:3:icf cancel vl>30 cancel log:chatfast:0:5:cif cmdc:kickchatfast
            vl>40 cancel log:chatfast:0:5:cif cmdc:kickchat1
      message:
        lettercount: 1.0
        partition: 1.0
        uppercase: 1.2
        afterjoin: 1.5
        nomoving: 1.1
        repeatviolation: 2.0
        repeatglobal: 1.0
        repeatself: 1.5
        words:
          lengthav: 1.0
          lengthmsg: 1.0
          noletter: 0.2
      global:
        active: true
        weight: 1.0
        words:
          active: true
        prefixes:
          active: false
        similarity:
          active: true
      player:
        active: true
        words:
          active: true
        prefixes:
          active: true
        similarity:
          active: true
    warning:
      active: true
      level: 67
      message: "\n  &c&l(!)&7 Please slow down chat, you might get kicked by the antispam.\n\
        \ \n"
      timeout: 10
    relog:
      active: default
      timeout: 5000
      warning:
        message: '&c&l(!)&7 You relogged suspiciously fast! If you keep doing that,
          you risk being banned. Bots are not allowed on TrueOG.'
        number: 1
        timeout: 60000
      kickmessage: Too fast re-login, try with a little delay.
      actions: log:relog:0:10:cf cancel vl>20 log:relog:0:10:cf cancel cmdc:tempkick5
    logins:
      active: default
      startupdelay: 600
      perworldcount: false
      seconds: 10
      limit: 10
      kickmessage: Too many players are logging in at the same time, please try again
        later.
  combined:
    active: default
    enderpearl:
      active: true
      preventclickblock: true
    improbable:
      active: true
      level: 198
      actions: cancel vl>4 log:improbable:0:6:i cancel vl>520 cancel vl>600 cancel
        vl>720 cancel vl>1200 cancel
    invulnerable:
      active: true
      triggers:
        always: false
        falldistance: false
      initialticks:
        join: -1
      ignore:
      - FALL
      modifiers:
        all: 0
    munchhausen:
      active: true
      actions: cancel vl>100 cancel log:munchhausen:0:60:if
    yawrate:
      rate: 105
      penalty:
        factor: 1.0
        minimum: 250
        maximum: 2000
      improbable:
        feedonly: false
        weight: 90.0
  fight:
    active: true
    canceldead: true
    maxloopletencyticks: 8
    toolchangepenalty: 0
    pvp:
      knockbackvelocity: false
    yawrate:
      active: true
    angle:
      # Disabled: LightningGrim MultiInteractA/B + Hitboxes + Aim own killaura geometry. NCP angle is false-prone on crowds/sweep hits.
      active: false
      threshold:
        average_move: 100
        average_time: 150
        average_yaw: 60
        average_switch: 50
      actions: cancel vl>100 log:angle:6:5:i cancel vl>800 log:angle:0:20:if cancel
    critical:
      active: true
      falldistance: 0.075
      falldistleniency: 9.0E-4
      actions: cancel log:critical:5:10:icf
    direction:
      active: false
      strict: true
      failall: true
      penalty: 75
      actions: vl>2 log:fdirectionlowvl:5:6:i vl>10 cancel log:fdirection:2:4:if vl>50
        cancel log:fdirection:0:7:icf cmdc:kicksuspiciouscombat:1:5
    fastheal:
      active: true
      interval: 4000
      buffer: 1000
      actions: cancel vl>8 cancel log:fastheal:2:6:i vl>20 cancel log:fastheal:1:1:i
        vl>60 cancel log:fastheal:0:10:if cmdc:kickfastheal:0:10
    godmode:
      active: true
      minage: 1100
      maxage: 5000
      actions: cancel vl>10 cancel log:godmode:0:5:icf cmdc:kickgod:0:5
    impossiblehit:
      active: true
      improbable:
        weight: 0.05
      actions: cancel vl>3 cancel log:impossiblehit:0:5:if
    noswing:
      active: default
      actions: vl>2 cancel vl>10 log:noswing:2:5:i cancel
    reach:
      # Disabled: LightningGrim owns reach (precise hitbox + post-packet). NCP fight.reach is heuristic and would double-flag / false on laggy Via clients.
      active: false
      survivaldistance: 4.0
      penalty: 250
      reduce: true
      precision: true
      reducedistance: 0.4
      reducestep: 0.1
      improbable:
        feedonly: false
        weight: 2.0
      actions: cancel vl>1 cancel log:freach:8:9:i vl>5 cancel log:freach:2:6:i vl>12
        cancel log:freachhighvl:1:5:if vl>35 cancel log:freachhighvl:0:5:if cmdc:kicksuspiciouscombat:2:1
    selfhit:
      active: false
      actions: cancel log:fselfhit:0:5:icf cmdc:kickselfhit:0:5
    speed:
      active: true
      limit: 15
      actions: cancel vl>10 cancel log:fspeed:2:5:i vl>60 cancel log:fspeed:0:5:if
        cmdc:kickattackfrequency:0:10
      shortterm:
        ticks: 7
        limit: 5
      improbable:
        feedonly: false
        weight: 1.0
    visible:
      active: default
      actions: cancel vl>30 log:fvisible:8:5:if cancel
  inventory:
    active: false
    fastclick:
      active: false
      exclude:
      - Inventory Name Here
      sparecreative: true
      tweaks1_5: true
      limit:
        shortterm: 4
        normal: 15
        chest: 155
      improbable:
        weight: 0.7
      actions: cancel vl>150 cancel log:fastclick:7:5:i vl>400 cancel log:fastclick:1:5:if
        vl>3000 cancel log:fastclick:1:2:if cmdc:kickfastclick:2:5
    instantbow:
      active: true
      strict: true
      delay: 75
      improbable:
        feedonly: false
        weight: 0.6
      actions: cancel vl>15 cancel log:instantbow:4:5:i vl>200 cancel log:instantbow:0:10:if
        cmdc:kickbow:2:10
    instanteat:
      active: true
      actions: log:instanteat:2:5:i cancel
    fastconsume:
      active: true
      duration: 1.5
      whitelist: false
      items: []
      actions: cancel vl>25 log:fastconsume:2:5:if cancel vl>35
    inventorymove:
      active: false
      disable_creative: true
      hdistdivisor: 4
      improbable:
        feedonly: false
        weight: 2.0
      actions: cancel vl>10 log:inventorymove:7:8:i cancel
    gutenberg:
      active: true
      pagelimit: 4999
      actions: cancel log:gutenberg:0:10:i cmd:kickinvaliddata:0:2
    items:
      active: false
    open:
      active: false
      close: false
      cancelother: false
    hotfix:
      duplication:
        fallingblockendportal: true
  moving:
    active: true
    creativefly:
      # NCP owns flight (elytra/levitation/riptide); ignoreallowflight+ignorecreative skip /fly and /gmc so flight-accel mods still work there.
      active: true
      ignoreallowflight: true
      ignorecreative: true
      model:
        creative:
          horizontal:
            speed: 100
          vertical:
            ascend:
              speed: 100
            maxheight: 128
        spectator:
          horizontal:
            speed: 450
          vertical:
            ascend:
              speed: 170
            maxheight: 200
          ground: false
        levitation:
          horizontal:
            speed: 50
          vertical:
            ascend:
              speed: 10
            maxheight: 200
            gravity: false
          modifiers: false
          ground: true
        slowfalling:
          horizontal:
            speed: 65
          vertical:
            ascend:
              speed: 0
            maxheight: 200
            gravity: false
          modifiers: true
          ground: true
        riptiding:
          horizontal:
            speed: 2500
          vertical:
            ascend:
              speed: 600
            maxheight: 1024
          modifiers: false
        elytra:
          horizontal:
            speed: 2500
            modsprint: 1.0
          vertical:
            ascend:
              speed: 2500
            maxheight: 1024
          modifiers: false
          resetFwOnground: true
          strict: false
      actions: vl>800 cancel vl>1200 cancel
    morepackets:
      # Disabled: LightningGrim TimerA owns timer/move-rate (transaction-balanced, far more precise than NCP morepackets).
      active: false
      seconds: 6
      epsideal: 20
      epsmax: 22
      burst:
        packets: 15
        directviolation: 10
        epmviolation: 95
      setbackage: 110
      actions: cancel vl>2 cancel log:morepackets:10:9:i vl>100 cancel log:morepackets:0:2:ifc
        cmdc:kickpackets:0:10
    nofall:
      active: false
      dealdamage: false
      skipallowflight: false
      resetonviolation: true
      resetonteleport: false
      resetonvehicle: false
      anticriticals: true
      actions: log:nofall:0:7:i cancel vl>666 cancel vl>12 cancel
    passable:
      active: false
      actions: log:passable:0:7:i vl>500 cancel
      untracked:
        teleport:
          active: true
        command:
          active: true
          tryteleport: true
          prefixes:
          - sethome
          - home set
          - setwarp
          - warp set
          - setback
          - set back
          - back set
          - warp
          - home
          - tp
          - tpa
          - tpask
          - tpyes
          - tphere
    survivalfly:
      # NCP owns survival ground/air movement (bhop, speed, step, jesus, spider). Grim Simulation setback is disabled (config.yml) so the two don't fight.
      active: true
      stepheight: true
      extended:
        vertical-accounting: false
        horizontal-accounting: true
        step-accounting: true
        noslow: true
        reset-activeitem: true
      leniency:
        hbufmax: 1.0
        violationfrequency:
          active: true
          debug: false
          maxleniencyvl: 2222
          mintoadd: 1
          morevls: 1
          movecount: 10
        freezecount: 40
        freezeinair: true
      setbackpolicy:
        falldamage: false
        voidtovoid: true
      actions: vl>2222 cancel
      hover:
        active: true
        step: 5
        ticks: 85
        loginticks: 60
        falldamage: false
        sfviolation: 200
    trace:
      maxage: 30
      maxsize: 30
    velocity:
      activationcounter: 20
      activationticks: 140
      strictinvalidation: true
    splitmoves: default
    ignorestance: default
    tempkickillegal: true
    loadchunks:
      join: true
      move: true
      teleport: true
      worldchange: true
    sprintinggrace: 4.0
    assumesprint: true
    speedgrace: 4.0
    enforcelocation: default
    setback:
      method: default
    vehicle:
      preventdestroyown: true
      enforcelocation: false
      schedulesetbacks: false
      schedulesetpassenger: false
      morepackets:
        # Disabled: LightningGrim VehicleTimer owns vehicle timer/move-rate.
        active: false
        actions: cancel vl>2 log:morepackets:2:5:if cancel vl>100 cancel log:morepackets:1:2:if
          cmdc:kickpackets:2:10
      envelope:
        active: false
        hdistcap:
          default: 0.9
          pig: 0.3
        actions: cancel vl>100 cancel log:vehicleenvelope:0:15:i
    message:
      illegalplayermove: Illegal move.
      illegalvehiclemove: Illegal vehicle move.
  net:
    active: true
    attackfrequency:
      active: true
      limitforseconds:
        half: 8
        one: 15
        two: 30
        four: 56
        eight: 88
      improbable:
        weight: 3.0
      actions: cancel vl>10 cancel log:attackfrequency:4:5:i vl>200 cancel log:attackfrequency:0:4:if
        cmdc:kickattackfrequency
    flyingfrequency:
      active: true
      seconds: 5
      packetspersecond: 60
      actions: cancel vl>20 cancel log:flyingfrequency:3:2:i vl>500 cancel log:flyingfrequency:0:5:if
        vl>1000 cancel log:flyingfrequency:0:2:icf cmdc:kickflyingfrequency:0:10
      reduceredundant:
        active: true
        seconds: 3
        actions: cancel
    keepalivefrequency:
      active: false
      seconds: 60
      actions: cancel log:keepalive:2:10:icf cmdc:kickalive:0:5
    moving:
      active: false
      actions: cancel vl>17 cancel log:moving:10:15:i
    packetfrequency:
      active: true
      limitpersecond: 300
      seconds: 4
      actions: cancel vl>2 cancel cmdc:kickpacketfrequency:0:5
    sounddistance:
      active: true
      maxdistance: 420
    superseded:
      flying:
        cancelwaiting: true
    wrongturn:
      active: false
      actions: cancel log:wrongturn:0:15:icf cmdc:kickillegalrotations:0:10
strings:
  against: '&c[player]&7 failed &c[check]&7: tried to place a block against liquid
    blocks or air as if they were solid &7(&cVL[violations]&7)'
  angle: '&c[player]&7 failed &c[check]&7: potentially tried to hit multiple entities
    at the same time (Tags: &6[tags]&7) &7(&cVL[violations]&7)'
  attackfrequency: '&c[player]&7 failed &c[check]&7: seems to be using an autoclicker
    (Clicks: &6[packets]&7/LimitPerTime-frame: &6[limit]&7, &6[tags]&7) &7(&cVL[violations]&7)'
  bautosign: '&c[player]&7 failed &c[check]&7: tried to use the autosign hack (Subcheck:
    &6[tags]&7) &7(&cVL[violations]&7)'
  bbfrequency: '&c[player]&7 failed &c[check]&7: tried to break too many blocks at
    once &7(&cVL[violations]&7)'
  bdirection: '&c[player]&7 failed &c[check]&7: tried to interact with a block outside
    their line of sight &7(&cVL[violations]&7)'
  bpspeed: '&c[player]&7 failed &c[check]&7: tried to throw projectiles too quickly
    &7(&cVL[violations]&7)'
  breach: '&c[player]&7 failed &c[check]&7: tried to interact with a block too far
    away &7(&cVL[violations]&7)'
  bspeed: '&c[player]&7 failed &c[check]&7: tried to interact with blocks beyond legit
    speeds &7(&cVL[violations]&7)'
  bvisible: '&c[player]&7 failed &c[check]&7: tried to interact with a block through
    a solid obstacle &7(&cVL[violations]&7)'
  bwrong: '&c[player]&7 failed &c[check]&7: tried to break another block than interacted
    with last &7(&cVL[violations]&7)'
  captcha: '[player] failed captcha repeatedly &7(&cVL[violations]&7)'
  chatfast: '&c[player]&7 failed &c[check]&7: acted like spamming (message deleted)
    &7(&cVL[violations]&7)'
  chatnormal: '&c[player]&7 failed &c[check]&7: seems to be spamming the server chat
    &7(&cVL[violations]&7)'
  commands: '&c[player]&7 failed &c[check]&7: issued too many commands too quickly
    &7(&cVL[violations]&7)'
  creativefly: '&c[player]&7 failed &c[check]&7: tried to perform a move that deviates
    from the model (Model: &6[model]&7, Tags: &6[tags]&7) &7(&cVL[violations]&7)'
  critical: '&c[player]&7 failed &c[check]&7: tried to perform an illegal critical
    hit (Tags: &6[tags]&7) &7(&cVL[violations]&7)'
  fastbreak: '&c[player]&7 failed &c[check]&7: tried to break a block faster than
    possible (Block: &6[blocktype]&7) &7(&cVL[violations]&7)'
  fastclick: '&c[player]&7 failed &c[check]&7: tried to move items in their inventory
    too quickly (Tags: &6[tags]&7) &7(&cVL[violations]&7)'
  fastconsume: '&c[player]&7 failed &c[check]&7: tried to consume an item too quickly
    (Food: &6[food][tags]&7) &7(&cVL[violations]&7)'
  fastheal: '&c[player]&7 failed &c[check]&7: tried to regenerate their health bar
    faster than possible (Health: &6[health]&7) &7(&cVL[violations]&7)'
  fastplace: '&c[player]&7 failed &c[check]&7: tried to place blocks too quickly &7(&cVL[violations]&7)'
  fdirection: '&c[player]&7 failed &c[check]&7: tried to hit an entity outside their
    line of sight &7(&cVL[violations]&7)'
  fdirectionlowvl: '&c[player]&7 failed &c[check]&7: could be using an aimbot (hit
    not canceled) &7(&cVL[violations]&7)'
  flyfile: '&c[player]&7 failed &c[check]&7: tried to perform an illegal move from
    ([locationfrom]) to ([locationto]) over a distance of ([distance]) blocks, subchecks
    triggered> ([tags]) &7(&cVL[violations]&7)'
  flyingfrequency: '&c[player]&7 failed &c[check]&7: is manipulating packets sent
    to the server to gain an unfair advantage &7(&cVL[violations]&7)'
  freach: '&c[player]&7 failed &c[check]&7: tried to hit an entity from a suspicious
    distance (Reach: &6[reachdistance]&7) &7(&cVL[violations]&7)'
